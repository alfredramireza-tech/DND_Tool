sessions:
  - date: "2026-03-26"
    session: 1
    summary: "Full audit + 3 CC handoffs: UX Enhancements (9 tasks), Combat HUD Redesign, Sticky Fix + Spell Buff System"
    learned:
      - "Spec'd max-height constraints can clip real content — enumerate worst-case content before capping"
      - "Concentration was purely cosmetic — no D&D buff had mechanical effect on dashboard until this session"
      - "Sacred Flame and Toll the Dead are save-based, not attack-roll cantrips — caught in handoff review before CC implemented it wrong"
      - "Quick Action scope should be weapons + rollable cantrips only — leveled spells need slot selection modal and clutter the dropdown"
    next: "Testing pass recommended before adding more features. Then class implementations (Rogue/Barbarian/Monk) or avatar images."

  - date: "2026-03-26"
    session: 2
    summary: "Testing pass: 6 bugs fixed, concentration/buff architecture redesigned, custom buff editor, roll integration, max HP boost feature"
    learned:
      - "renderConcentrationBanner() was orphaned during HUD redesign — always verify render calls after major layout changes"
      - "Concentration and buffs are independent systems: 'I hold this spell' vs 'this effect is on me' — merging them caused wrong AC on teammate-targeted spells"
      - "Temp HP (damage buffer) and max HP boost (ceiling raise) are different D&D mechanics — both now supported"
      - "SPELL_BUFF_EFFECTS needed structured rollBonus data alongside display-only rollReminder strings for auto-apply to work"
      - "File split should happen before remaining classes, not after — dependency graph grows exponentially"
      - "concentration.effects was an array of typed objects in live data, not a flat object — always check actual data shape before writing migration code"
    next: "File split (T4) — design spec for modular JS architecture. Then class implementations starting with whichever class the party needs next."

  - date: "2026-03-26"
    session: 3
    summary: "File split (T4) — split monolithic index.html (10,990 lines) into 17 modular files. index.html reduced to 385-line HTML shell. Deployed and verified working."
    learned:
      - "PM could not load the full index.html — this blocked the standard PM/CC workflow. Session ran with CC acting as both PM and CC."
      - "The file had clean section comment headers (/* ═══ SECTION NAME ═══ */) that made cut points obvious — worth maintaining in future work"
      - "No parse-time cross-file dependencies in this codebase — all cross-references are runtime calls, so plain <script> load order just needs data before utils before features"
      - "git pull during deploy can trigger a vim merge prompt when remote has auto-saved characters — suggested setting git editor to notepad for Windows comfort"
    next: "Class implementations. Roll system needs flat bonus + damage roll type before Barbarian can ship. Then Rogue/Barbarian/Monk, then Paladin/Wizard."

  - date: "2026-03-26"
    session: 4
    summary: "Paladin full implementation (4 handoffs), 3-class PHB audit cycle, Wizard spell infrastructure, DM Screen spec"
    learned:
      - "Adding spells to shared SPELL_DB without filtering derived arrays (CLERIC_SPELLS) causes cross-class spell leaks — always add a class-specific spell list filter when the shared DB grows"
      - "getSpellSummaryLine() and renderSpellCard() had parallel hardcoded WIS paths — both need updating when making spell rendering class-aware"
      - "spell.healing.mod should be treated as a boolean signal (truthy = add spellcasting mod), not as a literal ability name — the actual ability comes from CLASS_DATA"
      - "CLERIC_PROGRESSION was missing levels 2-3 because the app was originally designed for level 3+ characters — any class progression table must cover level 2 minimum"
      - "PHB audits catch real errors: 10 total across 3 classes. Worth the investment before players use the tool"
      - "Wizard spell name list (199 names, levels 1-9) can be built ahead of data — pays off as a routing table for spell lookups and future class implementation"
      - "DM's primary combat bottleneck is Deal Damage (number input, not +/- buttons) and attack rolls (structured attackBonus/damageDice fields, not just text)"
    next: "Rogue class implementation. Then Wizard. Then DM Screen build from SPEC_DM_SCREEN.md."

  - date: "2026-03-27"
    session: 5
    summary: "Rogue full implementation (4 handoffs + PHB audit), Conductor Discipline #6, full data architecture refactor (T4, 8 phases + 2 audits)"
    learned:
      - "AI-generated code can look mechanically correct while implementing wrong behavior — PHB audits remain essential (Rogue passed clean, validating the process)"
      - "toggleSlot() had been broken for EK since session 1 — pre-existing bugs surface when new classes exercise shared infrastructure"
      - "EK long rest never reset ekSlotsUsed — found during Rogue AT implementation. Absorbed by the unified storage refactor."
      - "First-consumer placement is a universal anti-pattern: Wizard data in fighter.js, Cleric slots named CLERIC_SPELL_SLOTS but shared with Wizard. Discipline #6 addresses this going forward."
      - "The right moment to catch misplacement is the second consumer (import smell), not creation time — you can't predict reuse when building the first consumer"
      - "Bulk search-and-replace on names that are substrings of other names causes cascading corruption — use word-boundary matching"
      - "Merging large arrays mechanically produces double-comma bugs (},,) creating undefined slots — always validate after merge"
      - "Splitting spell architecture into encyclopedia (what spells do) vs access lists (which class gets which) is a clean separation of concerns"
      - "Three parallel storage patterns (ekSlotsUsed/atSlotsUsed/spellSlotsUsed) caused the toggleSlot bug — unified storage eliminated the entire category of error"
      - "Independent CC review of PM's governance proposals produces better results than either alone — the PM/CC debate on Discipline #6 yielded a stronger final version"
    next: "Wizard spell data (~86 missing entries), then Wizard onboarding/dashboard/level-up. Then DM Screen."
