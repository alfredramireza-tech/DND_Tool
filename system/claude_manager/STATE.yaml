gap_log:
  - date: "2026-03-26"
    gap: "renderConcentrationBanner() orphaned during HUD redesign — never called from dashboard"
    cause: "Combat HUD handoff replaced the HP tracker block that contained the banner call, and the new HUD only added a small concentration badge without Drop/Change controls"
    resolution: "Re-added renderConcentrationBanner(c) call below the sticky HUD"
    severity: "high — core feature (dropping concentration) was completely inaccessible"
  - date: "2026-03-26"
    gap: "Concentration auto-applied buff effects to caster regardless of spell target"
    cause: "Buff system and concentration were built in the same handoff and merged — no separation between 'I hold this spell' and 'this effect is on me'"
    resolution: "Full architectural separation — concentration tracks spell maintenance, externalBuffs tracks all stat effects, 'Are you a target?' prompt bridges them"
    severity: "high — caused incorrect AC calculations when casting buffs on teammates"
  - date: "2026-03-26"
    gap: "Max-height cap in sticky HUD spec caused visible slot clipping"
    cause: "Spec'd max-height: 160px looked reasonable on paper but clipped real content when resource strip wrapped to 2 lines"
    resolution: "Removed max-height and overflow: hidden. Compact HUD design keeps it short naturally."
    severity: "medium — resource strip was visually broken until caught"
  - date: "2026-03-26"
    gap: "PM could not load full index.html — context window exceeded by 10,990-line monolith"
    cause: "All code in single file from project start. Each feature session added ~500-1500 lines with no split point"
    resolution: "T4 file split into 17 modules. PM can now load any individual file. Session ran in CC with CC acting as both PM and CC."
    severity: "high — PM was unable to fulfill navigator/translator role without loading the codebase"
  - date: "2026-03-26"
    gap: "SPELL_DB growth leaked non-Cleric spells into CLERIC_SPELLS derived array"
    cause: "CLERIC_SPELLS was built with an unfiltered SPELL_DB.forEach() loop. When Paladin spells were added to SPELL_DB, they automatically appeared in the Cleric picker."
    resolution: "Added CLERIC_SPELL_LIST constant (99 PHB Cleric spells) and filtered the build loop against it. Same pattern as PALADIN_SPELL_LIST."
    severity: "high — Clerics could prepare non-Cleric spells (Searing Smite, Hunter's Mark, etc.)"
  - date: "2026-03-26"
    gap: "Spell card rendering (getSpellSummaryLine + renderSpellCard) hardcoded WIS for DC, attack, and healing calculations"
    cause: "Original implementation was Cleric-only. When Paladin (CHA caster) was added, the hardcode wasn't caught until Handoff 4 audit"
    resolution: "Replaced wisMod with class-aware castMod from CLASS_DATA[char.class].spellcastingAbility in all spell rendering functions"
    severity: "high — all Paladin spell cards showed wrong DC, attack bonus, and healing values"
