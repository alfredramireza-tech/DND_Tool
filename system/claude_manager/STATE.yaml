gap_log:
  - date: "2026-03-27"
    gap: "Bulk search-and-replace corrupted prefixed names (FIGHTER_FEATURE_DESCRIPTIONS → FIGHTER_CLERIC_FEATURE_DESCRIPTIONS)"
    cause: "Renaming FEATURE_DESCRIPTIONS to CLERIC_FEATURE_DESCRIPTIONS hit all strings containing the substring, including FIGHTER_FEATURE_DESCRIPTIONS"
    resolution: "CC caught and fixed the cascading rename. Future renames should use word-boundary-aware search (whole-word match) not substring replacement."
    severity: "medium — would have broken Fighter feature display if not caught"
  - date: "2026-03-27"
    gap: "Double-comma bug (},,) after merging WIZARD_SPELL_DB into SPELL_DB — 85 undefined array entries"
    cause: "Mechanical merge of two large arrays introduced trailing commas that JavaScript parsed as undefined slots"
    resolution: "Fixed with sed. Future large array merges should include a post-merge validation step (check for undefined entries)."
    severity: "high — would have caused silent spell lookup failures"
  - date: "2026-03-27"
    gap: "First-consumer placement: Wizard spell data lived in data/fighter.js because EK was the first consumer"
    cause: "No governance principle existed to catch shared data being placed in a consumer-specific file"
    resolution: "Added Conductor Discipline #6: Catch misplacement at the second consumer. Three rules: import smell detection, PM routing decision, debt protocol."
    severity: "high — caused confusing cross-file dependencies and motivated the full data architecture refactor"

