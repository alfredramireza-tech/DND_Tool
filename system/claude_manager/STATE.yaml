gap_log:
  - date: "2026-03-28"
    gap: "logEvent() race condition — caller's stale copy overwrote log entries"
    cause: "logEvent() loaded a fresh character, added entry, saved. Callers that had already modified c would then saveCurrentCharacter(c) — overwriting the log."
    resolution: "logEvent(text, charObj) accepts optional char object. 37 callers in combat.js and resources.js pass c directly."
    severity: "high — session log appeared non-functional for all roll events"
  - date: "2026-03-28"
    gap: "Session log entries written to localStorage but DOM never updated after rolls"
    cause: "showRollResult() calls logEvent() but doesn't re-render. Session log HTML was stale."
    resolution: "Added targeted DOM prepend in showRollResult() to update session log in-place."
    severity: "medium — entries existed in data but invisible to user"
  - date: "2026-03-28"
    gap: "deleteFromCloud() silently failed — looked up character in localStorage after it was already deleted"
    cause: "Delete flow removed from localStorage first, then called deleteFromCloud() which tried to load the character to get its name"
    resolution: "deleteFromCloud() now accepts charName parameter directly. Both home screen and dashboard delete paths pass the name before removing from localStorage."
    severity: "medium — characters appeared deleted but persisted as ghosts in GitHub repo and Party View"
  - date: "2026-03-28"
    gap: "PHB mechanical audits don't catch onboarding UX bugs (wrong subtitles, picker pulling from wrong source)"
    cause: "Audit verified formulas, counts, and data model but didn't walk through screens as a user"
    resolution: "Added UX walk-through audit as a separate step. Ran 11 test combinations across 5 classes. Will include in future class builds."
    severity: "medium — mechanically correct but confusing user-facing text"
  - date: "2026-03-28"
    gap: "Paladin level 1→2 level-up grants spellcasting but never offers spell preparation"
    cause: "Level-up flow announced the feature and showed slots but had no preparation picker. Player exited with slots but zero prepared spells."
    resolution: "Added paladinPrepare screen to level-up. Required at level 2, optional at 5/9/13/17 when new spell levels unlock."
    severity: "high — Paladin was functionally unable to cast spells after leveling to 2"

